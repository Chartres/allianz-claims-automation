<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Allianz Claims — settings</title>
  <style>
    body { font: 14px/1.5 system-ui, sans-serif; max-width: 720px; margin: 24px auto; padding: 0 16px; color: #1a1a1a; }
    h1 { font-size: 18px; }
    textarea { width: 100%; height: 50vh; font: 12px/1.4 ui-monospace, monospace; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
    button { font: inherit; padding: 7px 14px; border: 1px solid #c8c8c8; border-radius: 6px; background: #f6f6f6; cursor: pointer; }
    .row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
    #status { color: #14532d; }
    .err { color: #8a1c14 !important; }
    p.muted { color: #777; }
  </style>
</head>
<body>
  <h1>Settings</h1>
  <p class="muted">Family members, providers→categories, coverage %, and treatment types — same shape as the CLI's <code>config.json</code>. First-run discovery (reading your logged-in portal) will pre-fill this; for now you can paste/edit it here.</p>
  <textarea id="cfg" spellcheck="false"></textarea>
  <div class="row"><button id="save">Save</button><span id="status"></span></div>
  <script type="module" src="options.js"></script>
</body>
</html>
