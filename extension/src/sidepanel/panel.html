<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Allianz Claims</title>
  <style>
    body { font: 13px/1.45 system-ui, sans-serif; margin: 0; padding: 12px; color: #1a1a1a; }
    h1 { font-size: 15px; margin: 0 0 8px; }
    h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: #888; margin: 14px 0 4px; }
    .bar { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin: 8px 0; }
    button, .btn { font: inherit; padding: 5px 9px; border: 1px solid #c8c8c8; border-radius: 6px; background: #f6f6f6; cursor: pointer; }
    button:hover, .btn:hover { background: #ececec; }
    button:disabled { opacity: .5; cursor: default; }
    #dropzone { border: 2px dashed #bcd; border-radius: 8px; padding: 16px; text-align: center; color: #789; background: #f7fafc; }
    #dropzone.over { background: #eef6ff; border-color: #6aa; }
    .rev { border: 1px solid #eee; border-radius: 6px; padding: 6px 8px; margin: 4px 0; display: flex; gap: 8px; align-items: flex-start; }
    .rev input[type=checkbox] { margin-top: 2px; }
    .rev .meta { font-variant-numeric: tabular-nums; }
    .rev .flags { color: #8a1c14; font-size: 12px; }
    .totals { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 12px; background: #f3f6fb; padding: 8px 10px; border-radius: 8px; margin-bottom: 10px; }
    .totals b { font-variant-numeric: tabular-nums; }
    table { width: 100%; border-collapse: collapse; margin: 6px 0 14px; }
    th, td { text-align: left; padding: 3px 6px; border-bottom: 1px solid #eee; white-space: nowrap; }
    th { color: #666; font-weight: 600; }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    .flag { font-size: 11px; padding: 1px 6px; border-radius: 10px; }
    .declined { background: #fde2e1; color: #8a1c14; } .under, .review, .over { background: #fff2cc; color: #6b5300; }
    .ok, .full { background: #def7e5; color: #14532d; } .pending { background: #e7eefc; color: #1e3a8a; }
    .muted { color: #999; } hr { border: none; border-top: 1px solid #eee; margin: 16px 0; }
  </style>
</head>
<body>
  <h1>Allianz Claims Helper</h1>

  <h2>File invoices</h2>
  <div class="bar">
    <button id="pickFolder">📁 Choose folder</button>
    <button id="rescan" hidden>↻ Rescan</button>
    <span id="folderName" class="muted"></span>
  </div>
  <div id="dropzone">Drop invoice PDFs or photos here</div>
  <div id="review"></div>
  <div class="bar" id="fileBar" hidden>
    <button id="fileThese">File selected →</button><span id="fileStatus" class="muted"></span>
  </div>

  <hr>

  <h2>Tracker</h2>
  <div class="bar">
    <button id="refresh" title="Re-crawl the portal (needs you logged in)">↻ Refresh</button>
    <label class="btn">Import CSV<input id="import" type="file" accept=".csv" hidden></label>
    <button id="export">Export CSV</button>
  </div>
  <div id="totals" class="totals"></div>
  <div id="content"><div class="muted" style="padding:12px 2px">No data yet — Refresh (while logged in) or Import CSV.</div></div>

  <script type="module" src="panel.js"></script>
</body>
</html>
