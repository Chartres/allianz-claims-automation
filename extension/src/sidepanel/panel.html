<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Allianz Claims</title>
  <style>
    body { font: 13px/1.45 system-ui, sans-serif; margin: 0; padding: 12px; color: #1a1a1a; }
    h1 { font-size: 15px; margin: 0 0 8px; }
    .bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    button, .btn { font: inherit; padding: 5px 9px; border: 1px solid #c8c8c8; border-radius: 6px; background: #f6f6f6; cursor: pointer; }
    button:hover, .btn:hover { background: #ececec; }
    .totals { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 12px; background: #f3f6fb; padding: 8px 10px; border-radius: 8px; margin-bottom: 10px; }
    .totals b { font-variant-numeric: tabular-nums; }
    table { width: 100%; border-collapse: collapse; margin: 6px 0 14px; }
    th, td { text-align: left; padding: 3px 6px; border-bottom: 1px solid #eee; white-space: nowrap; }
    th { color: #666; font-weight: 600; }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    .flag { font-size: 11px; padding: 1px 6px; border-radius: 10px; }
    .declined { background: #fde2e1; color: #8a1c14; }
    .under, .review, .over { background: #fff2cc; color: #6b5300; }
    .ok, .full { background: #def7e5; color: #14532d; }
    .pending { background: #e7eefc; color: #1e3a8a; }
    h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: #888; margin: 14px 0 4px; }
    .muted { color: #999; }
    #empty { color: #777; padding: 20px 4px; }
  </style>
</head>
<body>
  <h1>Allianz Claims Tracker</h1>
  <div class="bar">
    <button id="refresh" title="Re-crawl the portal (needs you logged in)">↻ Refresh</button>
    <label class="btn">Import CSV<input id="import" type="file" accept=".csv" hidden></label>
    <button id="export">Export CSV</button>
  </div>
  <div id="totals" class="totals"></div>
  <div id="content"><div id="empty">No data yet. Click <b>Refresh</b> (while logged into Allianz) to crawl your claims, or <b>Import CSV</b> from a previous export.</div></div>
  <script type="module" src="panel.js"></script>
</body>
</html>
